name: "Terminate test"

on:
    push:
        branches:
            - 'fix-process-termination-by-id'
    pull_request:

jobs:
    Terminate:
        runs-on: ${{
            (matrix.os == 'linux')   && 'ubuntu-latest' ||
            (matrix.os == 'macos')   && 'macos-latest'  ||
            (matrix.os == 'windows') && 'windows-latest' ||
                                        'ubuntu-latest' }}

        strategy:
            fail-fast: false
            matrix:
                include:
                    - {os: linux,   arch: amd64}
                    - {os: macos,   arch: arm64}
                    - {os: windows, arch: amd64}

        defaults:
            run:
                shell: ${{ (matrix.os == 'windows') && 'msys2 {0}' || 'bash' }}

        steps:
            - name: Checkout Arturo sources
              uses: actions/checkout@v4
              with:
                submodules: recursive
                path: arturo
                ref: ${{ github.ref }}
                fetch-depth: 0

            - name: Install Arturo
              uses: arturo-lang/setup-arturo@v2
              with:
                do: compile
                token: ${{ secrets.GITHUB_TOKEN }}
                os: ${{ matrix.os }}
                arch: ${{ matrix.arch }}
                src: ${{ github.ref }}
                metadata: terminate-test
                create_artifact: 'false'

            - name: Test terminate (POSIX)
              if: matrix.os != 'windows'
              run: |
                perl -e 'sleep 300' &
                BGPID=$!
                echo "spawned PID=$BGPID"
                kill -0 $BGPID || { echo "process never started"; exit 1; }
                arturo -e "terminate $BGPID"
                sleep 1
                if kill -0 $BGPID 2>/dev/null; then
                    echo "FAIL: process $BGPID still alive after terminate"
                    kill -9 $BGPID 2>/dev/null
                    exit 1
                fi
                echo "OK: terminated"

            - name: Test terminate (Windows)
              if: matrix.os == 'windows'
              run: |
                BGPID=$(powershell.exe -NoProfile -Command '$p = Start-Process powershell -ArgumentList "-Command","Start-Sleep -Seconds 300" -PassThru -WindowStyle Hidden; $p.Id' | tr -d '\r\n ')
                echo "spawned PID=$BGPID"
                if ! powershell.exe -NoProfile -Command "if (Get-Process -Id $BGPID -ErrorAction SilentlyContinue) { exit 0 } else { exit 1 }"; then
                    echo "process never started"; exit 1
                fi
                arturo -e "terminate $BGPID"
                sleep 1
                if powershell.exe -NoProfile -Command "if (Get-Process -Id $BGPID -ErrorAction SilentlyContinue) { exit 0 } else { exit 1 }"; then
                    echo "FAIL: process $BGPID still alive after terminate"
                    powershell.exe -NoProfile -Command "Stop-Process -Id $BGPID -Force" || true
                    exit 1
                fi
                echo "OK: terminated"
